            font-weight: bold; 
            padding: 8px 16px; 
            border-radius: 20px; 
            margin-bottom: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); 
            transition: all 0.2s ease; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }

            box-shadow: 0 6px 8px rgba(0,0,0,0.3); 
        }
        
        h1 {

            text-transform: uppercase;

            letter-spacing: 1px;

        .ranking-table th, .ranking-table td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #eef0f2; }
        .ranking-table th { background-color: #f8f9fa; color: var(--secondary); font-weight: bold; }
        .ranking-table tr:last-child td { border-bottom: none; }
        .podium { font-weight: bold; color: #f39c12; }

        .runde-datum { font-size: 0.8rem; color: #7f8c8d; font-weight: normal; margin-left: 5px; }
        
        .match-card { background: var(--card-bg); border-radius: 8px; padding: 15px; margin-bottom: 15px; border: 1px solid #eef0f2; box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: transform 0.2s; }
        .match-status { display: inline-block; font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; font-weight: bold; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .status-offen { background: #fff3cd; color: #856404; }
        .status-gespielt { background: #d4edda; color: #155724; }
        .status-cancelled { background: #e2e3e5; color: #383d41; }

        .btn-edit { background: #3498db; }
        .btn-edit:hover { background: #2980b9; }

<header>
    <a href="https://tennis-steindorf.at" class="header-btn" target="_blank">📅 Tennisplatz online buchen</a>
    <h1>🎾 Turnierverwaltung <span class="title-sub">SC Steindorf</span></h1>
    <div class="controls">
        <div class="select-container">
            Bewerb: 
            <select id="bewerbDropdown" onchange="changeBewerb()">
                <option value="Doppel">Doppel</option>
                <option value="Einzel">Einzel</option>
            </select>
        </div>
        <div class="select-container">
            Gruppe: 
            <select id="groupDropdown" onchange="changeGroup()"></select>
        </div>
        <div class="select-container">
            Profil: 
            <select id="userDropdown" onchange="changeUser()"></select>
        </div>
    </div>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('spiele')">Spiele</button>
        <button class="tab-btn" onclick="switchTab('rangliste')">Rangliste</button>
        <button class="tab-btn" onclick="switchTab('gesamt')">Gesamt-Ranking</button>
    </div>

    <div class="progress-container">
        <div class="progress-text">
            <span>Turnierfortschritt</span>
            <span id="progress-stats">Lade Live-Daten...</span>
        </div>
        <div class="progress-bar-bg">
            <div id="progress-bar" class="progress-bar-fill"></div>
        </div>
    </div>

    <div id="tab-spiele" class="tab-content active">
        <div id="spiele-liste"></div>
        
        <div id="admin-zone">
            <div class="backup-zone">
                <button class="btn btn-backup" style="background: #27ae60;" onclick="exportTournamentData()">Backup Exportieren 💾</button>
                <button class="btn btn-backup" style="background: #2980b9;" onclick="triggerImport()">Backup Importieren 📂</button>
                <input type="file" id="importFileField" accept=".json" style="display: none;" onchange="importTournamentData(event)">
            </div>
            <button class="btn btn-reset" onclick="resetAllData()">Aktuelle Gruppe zurücksetzen 🔒</button>
        </div>
    </div>

    <div id="tab-rangliste" class="tab-content">
        <table class="ranking-table">
            <thead>
                <tr id="ranking-header"></tr>
            </thead>
            <tbody id="rangliste-body"></tbody>
        </table>
    </div>

    <div id="tab-gesamt" class="tab-content">
        <h3 style="margin-bottom: 10px; color: var(--secondary); border-left: 4px solid #1abc9c; padding-left: 8px;">Doppel (Alle Gruppen)</h3>
        <table class="ranking-table">
            <thead>
                <tr><th style="width: 60px;">Platz</th><th>Spieler</th><th style="text-align: right;">Gesamt-Games</th></tr>
            </thead>
            <tbody id="gesamt-doppel-body"></tbody>
        </table>

        <h3 style="margin: 25px 0 10px 0; color: var(--secondary); border-left: 4px solid #3498db; padding-left: 8px;">Einzel (Alle Gruppen)</h3>
        <table class="ranking-table">
            <thead>
                <tr><th style="width: 60px;">Platz</th><th>Spieler</th><th style="text-align: right;">Siege</th><th style="text-align: right;">Sätze</th></tr>
            </thead>
            <tbody id="gesamt-einzel-body"></tbody>
        </table>
    </div>
</div>

<div id="scoreModal" class="modal">
    <div class="modal-content">
        <input type="hidden" id="matchId">
        <h2 id="modalTitle">Ergebnis eintragen</h2>
        <div id="modalHint" class="modal-hint"></div>
        
        <div id="modalInputs"></div>
        
        <div class="modal-buttons">
            <button type="button" class="btn btn-cancel" onclick="closeModal()">Abbrechen</button>
            <button type="button" class="btn" onclick="saveScore()">Speichern</button>
        </div>
    </div>
</div>

let standardSpiele = {};

function generiereStandardSpiele() {
    standardSpiele = { 
        'Doppel': { 'A': [], 'B': [], 'C': [] }, 
        'Einzel': { 'A': [], 'B': [], 'C': [], 'D': [], 'E': [] } 
    };

    Object.keys(turnierSpielplaene).forEach(key => {
        const parts = key.split(" ");
        const bewerb = parts[0]; 
        const gruppe = parts[1]; 
        let matchIndex = 1;
        
        if(!standardSpiele[bewerb][gruppe]) standardSpiele[bewerb][gruppe] = [];

        turnierSpielplaene[key].forEach(spiel => {
            const rawSpieler = [...spiel.team1, ...spiel.team2];
            const cleanSpieler = rawSpieler.map(name => name.replace('*', ''));
            
            standardSpiele[bewerb][gruppe].push({
                id: `${bewerb.charAt(0).toLowerCase()}_${gruppe}_${matchIndex}`,
                runde: `Runde ${spiel.runde}`,
                datum: spiel.datum || "TBA",
                spieler: cleanSpieler,
                gespielt: false,
                cancelled: false,
                ergebnisse: {},
                detailErgebnis: "" 
            });
            matchIndex++;
        });
    });
}

let actBewerb = safeStorage.getItem('steindorfer_bewerb') || 'Doppel';
let actGroup = safeStorage.getItem('steindorfer_group_' + actBewerb) || 'A';
let currentUser = safeStorage.getItem('steindorfer_user_' + actBewerb + actGroup) || 'Gast';

let spiele = [];
let currentDbRef = null;

document.getElementById('bewerbDropdown').value = actBewerb;

function initSelects() {
    const gDrop = document.getElementById('groupDropdown');
    gDrop.innerHTML = '';
    gruppenStruktur[actBewerb].forEach(g => { gDrop.innerHTML += `<option value="${g}">Gruppe ${g}</option>`; });
    if (!gruppenStruktur[actBewerb].includes(actGroup)) actGroup = gruppenStruktur[actBewerb][0];
    gDrop.value = actGroup;

    const uDrop = document.getElementById('userDropdown');
    uDrop.innerHTML = '<option value="Gast">Gast</option><option value="Admin">Admin</option>';
    spielerListen[actBewerb][actGroup].forEach(user => { 
        if (user !== "Gast") uDrop.innerHTML += `<option value="${user}">${user}</option>`; 
    });
    
    currentUser = safeStorage.getItem('steindorfer_user_' + actBewerb + actGroup) || 'Gast';
    
    if (currentUser === 'Admin') {
        currentUser = 'Gast';
        safeStorage.setItem('steindorfer_user_' + actBewerb + actGroup, 'Gast');
    }

    if(!Array.from(uDrop.options).some(opt => opt.value === currentUser)) currentUser = 'Gast';
    uDrop.value = currentUser;
    
    toggleAdminZone();
}

function toggleAdminZone() {
    const adminZone = document.getElementById('admin-zone');
    if (currentUser === 'Admin') {
        adminZone.style.display = 'block';
    } else {
        adminZone.style.display = 'none';
    }
}

function listenToFirebase() {
    if (currentDbRef) currentDbRef.off();
    document.getElementById('progress-stats').innerText = "Synchronisiere...";
    
    currentDbRef = database.ref(`turnier/${actBewerb}_${actGroup}`);
    
    currentDbRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            spiele = data;
            spiele.forEach(match => { 
                if (!match.ergebnisse) match.ergebnisse = {}; 
                if (!match.detailErgebnis) match.detailErgebnis = "";
            });
        } else {
            spiele = JSON.parse(JSON.stringify(standardSpiele[actBewerb][actGroup]));
            currentDbRef.set(spiele);
        }
        
        updateProgressBar();
        if(document.querySelectorAll('.tab-btn')[0].classList.contains('active')) {
            renderSpiele();
        } else if(document.querySelectorAll('.tab-btn')[1].classList.contains('active')) {
            berechneRangliste();
        } else {
            berechneGesamtrangliste();
        }
    });
}

function changeBewerb() {
    actBewerb = document.getElementById('bewerbDropdown').value;
    safeStorage.setItem('steindorfer_bewerb', actBewerb);
    actGroup = gruppenStruktur[actBewerb][0];
    changeState();
}

function changeGroup() {
    actGroup = document.getElementById('groupDropdown').value;
    safeStorage.setItem('steindorfer_group_' + actBewerb, actGroup);
    changeState();
}

function changeUser() {
    const dropdown = document.getElementById('userDropdown');
    const selectedUser = dropdown.value;

    if (selectedUser !== 'Gast') {
        const pin = prompt(`Bitte Zugangscode für ${selectedUser} eingeben:`);
        if (pin !== playerPins[selectedUser]) {
            alert("Falscher Code! Zugriff verweigert.");
            dropdown.value = currentUser;
            return;
        }
    }

    currentUser = selectedUser;
    safeStorage.setItem('steindorfer_user_' + actBewerb + actGroup, currentUser);
    
    toggleAdminZone();
    renderSpiele();
}

function changeState() {
    initSelects();
    listenToFirebase();
}

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    
    if(tab === 'spiele') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('tab-spiele').classList.add('active');
        renderSpiele();
    } else if (tab === 'rangliste') {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('tab-rangliste').classList.add('active');
        berechneRangliste();
    } else if (tab === 'gesamt') {
        document.querySelectorAll('.tab-btn')[2].classList.add('active');
        document.getElementById('tab-gesamt').classList.add('active');
        berechneGesamtrangliste();
    }
}

function updateProgressBar() {
    const gesamtSpiele = spiele.filter(match => !match.cancelled).length;
    const gespilteSpiele = spiele.filter(match => match.gespielt && !match.cancelled).length;
    const prozent = gesamtSpiele > 0 ? Math.round((gespilteSpiele / gesamtSpiele) * 100) : 0;
    document.getElementById('progress-bar').style.width = prozent + '%';
    document.getElementById('progress-stats').innerText = `${gespilteSpiele} / ${gesamtSpiele} Spiele (${prozent}%)`;
}

function renderSpiele() {
    const liste = document.getElementById('spiele-liste');
    liste.innerHTML = '';
    let aktuelleRunde = "";
    
    spiele.forEach(match => {
        if (match.runde !== aktuelleRunde) {
            aktuelleRunde = match.runde;
            liste.innerHTML += `<div class="runde-header">${aktuelleRunde} <span class="runde-datum">(${match.datum})</span></div>`;
        }
        
        const card = document.createElement('div');
        card.className = 'match-card';
        
        const hasPermission = darfErgebnisEintragen(match, currentUser);
        let statusClass = match.gespielt ? 'status-gespielt' : 'status-offen';
        let statusText = match.gespielt ? 'Abgeschlossen' : 'Offen';
        
        if(match.cancelled) {
            statusClass = 'status-cancelled';
            statusText = 'Abgesagt';
        }

        let spielerHTML = (actBewerb === 'Doppel') 
            ? `<strong>Pool:</strong> ` + match.spieler.map((s, idx) => idx === 0 ? `<span class="organisator">${s}</span>` : s).join(', ')
            : `<div style="font-size: 1.1rem; text-align: center; font-weight: bold; margin: 10px 0;">${match.spieler[0]} <span style="color:#bdc3c7;">vs.</span> ${match.spieler[1]}</div>`;

        let ergebnisHTML = '', actionButton = '';
        
        if (match.cancelled) {
            ergebnisHTML = '<div class="ergebnis-text" style="color: var(--accent); text-align:center;">Spiel annulliert ❌</div>';
            actionButton = `<button class="btn btn-locked" disabled>Kein Spiel möglich 🔒</button>`;
        } else if (match.gespielt) {
            const trenner = actBewerb === 'Doppel' ? ' Games | ' : ' Sätze <br> ';
            const suffix = actBewerb === 'Doppel' ? ' Games' : ' Sätze';
            
            let detailString = match.detailErgebnis ? `<hr style="margin: 8px 0; border: none; border-top: 1px dashed #bdc3c7;"><div style="font-size: 0.9rem; font-weight: normal; color: #2c3e50;">Sätze: <strong>${match.detailErgebnis}</strong></div>` : '';
            
            let auditHTML = '';
            if (match.eingetragenVon && match.eingetragenAm) {
                const datumFormatiert = new Date(match.eingetragenAm).toLocaleString('de-AT', {day: '2-digit', month: '2-digit', hour: '2-digit', minute:'2-digit'});
                auditHTML = `<div style="font-size: 0.75rem; color: #95a5a6; text-align: center; margin-top: -5px; margin-bottom: 12px;">Eingetragen von <strong>${match.eingetragenVon}</strong> am ${datumFormatiert}</div>`;
            }
            
            ergebnisHTML = '<div class="ergebnis-text"><strong>' + match.spieler.map(s => `${s}: ${match.ergebnisse[s]}${suffix}`).join(trenner) + '</strong>' + detailString + '</div>' + auditHTML;
            
            actionButton = hasPermission ? 
                `<button class="btn btn-edit" onclick="openModal('${match.id}')">Bearbeiten</button>` : 
                `<button class="btn btn-locked" onclick="alert('Nur der Admin oder die beteiligten Spieler dürfen dieses Ergebnis bearbeiten.')">Gesperrt 🔒</button>`;
        } else {
            actionButton = hasPermission ? 
                `<button class="btn" onclick="openModal('${match.id}')">Eintragen</button>` : 
                `<button class="btn btn-locked" onclick="alert('Nur der Admin oder die beteiligten Spieler dürfen dieses Ergebnis eintragen.')">Eintragen 🔒</button>`;
        }

        card.innerHTML = `<div class="match-status ${statusClass}">${statusText}</div><div>${spielerHTML}</div>${ergebnisHTML}${actionButton}`;
        liste.appendChild(card);
    });
}

function openModal(id) {
    const match = spiele.find(s => s.id === id);
    if (match.cancelled) return;
    
    document.getElementById('matchId').value = id;
    const isEinzel = actBewerb === 'Einzel';
    
    document.getElementById('modalTitle').innerText = isEinzel ? "Ergebnis eintragen" : "Games eintragen";
    document.getElementById('modalHint').innerText = isEinzel ? "Gib die Gewinnsätze für das Ranking ein (0, 1 oder 2) und optional unten die genauen Sätze." : "Gib die gesammelten Games für das Ranking ein.";
    
    const inputsContainer = document.getElementById('modalInputs');
    inputsContainer.innerHTML = '';
    
    match.spieler.forEach((spieler, idx) => {
        const alterWert = (match.ergebnisse && match.ergebnisse[spieler] !== undefined) ? match.ergebnisse[spieler] : '';
        const maxAttr = isEinzel ? 'max="2"' : '';
        inputsContainer.innerHTML += `
            <div class="input-group">
                <label>${spieler}</label>
                <input type="number" id="playerScore_${idx}" min="0" ${maxAttr} inputmode="numeric" pattern="[0-9]*" value="${alterWert}">
            </div>`;
    });
    
    const alterDetailWert = match.detailErgebnis || '';
    inputsContainer.innerHTML += `
        <div class="detail-input-group">
            <label>Ergebnis im Detail (z. B. 6:4, 4:6, 10:8)</label>
            <input type="text" id="detailScore" placeholder="Optional..." value="${alterDetailWert}">
        </div>
    `;
    
    document.getElementById('scoreModal').style.display = 'flex';
}

function closeModal() { 
    document.getElementById('scoreModal').style.display = 'none'; 
}

function saveScore() {
    const id = document.getElementById('matchId').value;
    const match = spiele.find(s => s.id === id);
    
    if (!darfErgebnisEintragen(match, currentUser)) {
        alert('Keine Berechtigung! Das Ergebnis wurde nicht gespeichert.');
        closeModal();
        return;
    }

    let neueErgebnisse = {};
    match.spieler.forEach((spieler, idx) => {
        const val = parseInt(document.getElementById(`playerScore_${idx}`).value);
        neueErgebnisse[spieler] = isNaN(val) ? 0 : val;
    });

    if (actBewerb === 'Einzel') {
        const v1 = neueErgebnisse[match.spieler[0]];
        const v2 = neueErgebnisse[match.spieler[1]];
        if (v1 !== 2 && v2 !== 2) { alert("Fehler: Ein Spieler muss exakt 2 Gewinnsätze haben!"); return; }
        if (v1 === 2 && v2 === 2) { alert("Fehler: Es können nicht beide Spieler 2 Sätze gewinnen!"); return; }
    }

    match.ergebnisse = neueErgebnisse;
    match.detailErgebnis = document.getElementById('detailScore').value.trim();
    
    match.eingetragenVon = currentUser;
    match.eingetragenAm = new Date().toISOString(); 
    
    match.gespielt = true;
    
    if (currentDbRef) {
        currentDbRef.set(spiele);
    }
    closeModal();
}

function berechneRangliste() {
    const header = document.getElementById('ranking-header');
    if (actBewerb === 'Einzel') {
        header.innerHTML = `<th style="width: 60px;">Platz</th><th>Spieler</th><th style="text-align: right;">Siege</th><th style="text-align: right;">Sätze</th>`;
    } else {
        header.innerHTML = `<th style="width: 60px;">Platz</th><th>Spieler</th><th style="text-align: right;">Games</th>`;
    }

    const stats = {};
    spielerListen[actBewerb][actGroup].filter(s => s !== "Gast").forEach(s => { stats[s] = { games: 0, siege: 0, saetze: 0 }; });
    
    spiele.forEach(match => {
        if (match.gespielt && !match.cancelled) {
            if (actBewerb === 'Einzel') {
                const p1 = match.spieler[0]; const p2 = match.spieler[1];
                const s1 = match.ergebnisse[p1] || 0; const s2 = match.ergebnisse[p2] || 0;
                stats[p1].saetze += s1; stats[p2].saetze += s2;
                if (s1 > s2) stats[p1].siege += 1;
                if (s2 > s1) stats[p2].siege += 1;
            } else {
                match.spieler.forEach(spieler => { stats[spieler].games += (match.ergebnisse[spieler] || 0); });
            }
        }
    });
    
    let sortiert = Object.keys(stats).map(key => ({ name: key, ...stats[key] }));
    if (actBewerb === 'Einzel') {
        sortiert.sort((a, b) => (b.siege !== a.siege) ? (b.siege - a.siege) : (b.saetze - a.saetze));
    } else {
        sortiert.sort((a, b) => b.games - a.games);
    }

    const tbody = document.getElementById('rangliste-body');
    tbody.innerHTML = '';
    sortiert.forEach((spieler, index) => {
        let platzText = index + 1;
        if(index === 0) platzText = '<span class="podium">1🥇</span>';
        if(index === 1) platzText = '2🥈';
        if(index === 2) platzText = '3🥉';
        
        if (actBewerb === 'Einzel') {
            tbody.innerHTML += `<tr><td>${platzText}</td><td><strong>${spieler.name}</strong></td><td style="text-align: right; font-weight: bold; color: var(--primary);">${spieler.siege}</td><td style="text-align: right;">${spieler.saetze}</td></tr>`;
        } else {
            tbody.innerHTML += `<tr><td>${platzText}</td><td><strong>${spieler.name}</strong></td><td style="text-align: right; font-weight: bold; color: var(--primary);">${spieler.games}</td></tr>`;
        }
    });
}

function berechneGesamtrangliste() {
    document.getElementById('gesamt-doppel-body').innerHTML = '<tr><td colspan="3">Lade globale Daten...</td></tr>';
    document.getElementById('gesamt-einzel-body').innerHTML = '<tr><td colspan="4">Lade globale Daten...</td></tr>';

    database.ref('turnier').once('value').then((snapshot) => {
        const allData = snapshot.val() || {};
        const doppelStats = {};
        const einzelStats = {};

        Object.keys(spielerListen).forEach(bewerb => {
            Object.keys(spielerListen[bewerb]).forEach(gruppe => {
                spielerListen[bewerb][gruppe].forEach(spieler => {
                    // Mister X und Gast für das Gesamtranking ignorieren
                    if (spieler !== "Gast" && spieler !== "Mister X") {
                        const key = `${spieler} (${gruppe})`;
                        if (bewerb === 'Doppel') {
                            doppelStats[key] = { name: spieler, gruppe: gruppe, games: 0 };
                        } else {
                            einzelStats[key] = { name: spieler, gruppe: gruppe, siege: 0, saetze: 0 };
                        }
                    }
                });
            });
        });

        Object.keys(allData).forEach(groupKey => {
            const parts = groupKey.split('_');
            const bewerb = parts[0];
            const gruppe = parts[1];
            const matches = allData[groupKey] || [];

            matches.forEach(match => {
                if (match.gespielt && !match.cancelled) {
                    if (bewerb === 'Einzel') {
                        const p1 = match.spieler[0]; const p2 = match.spieler[1];
                        const s1 = (match.ergebnisse && match.ergebnisse[p1]) || 0; 
                        const s2 = (match.ergebnisse && match.ergebnisse[p2]) || 0;
                        const k1 = `${p1} (${gruppe})`; const k2 = `${p2} (${gruppe})`;

                        if(einzelStats[k1]) {
                            einzelStats[k1].saetze += s1;
                            if (s1 > s2) einzelStats[k1].siege += 1;
                        }
                        if(einzelStats[k2]) {
                            einzelStats[k2].saetze += s2;
                            if (s2 > s1) einzelStats[k2].siege += 1;
                        }
                    } else if (bewerb === 'Doppel') {
                        match.spieler.forEach(spieler => {
                            const key = `${spieler} (${gruppe})`;
                            if (doppelStats[key]) {
                                doppelStats[key].games += (match.ergebnisse && match.ergebnisse[spieler]) || 0;
                            }
                        });
                    }
                }
            });
        });

        let sortiertDoppel = Object.keys(doppelStats).map(k => doppelStats[k]).sort((a, b) => b.games - a.games);
        const doppelTbody = document.getElementById('gesamt-doppel-body');
        doppelTbody.innerHTML = '';
        sortiertDoppel.forEach((spieler, idx) => {
            let platz = idx + 1;
            if(idx === 0) platz = '<span class="podium">1🥇</span>';
            if(idx === 1) platz = '2🥈';
            if(idx === 2) platz = '3🥉';
            doppelTbody.innerHTML += `<tr><td>${platz}</td><td><strong>${spieler.name}</strong> <span style="color:#7f8c8d; font-size:0.8rem;">(Gruppe ${spieler.gruppe})</span></td><td style="text-align: right; font-weight: bold; color: var(--primary);">${spieler.games}</td></tr>`;
        });

        let sortiertEinzel = Object.keys(einzelStats).map(k => einzelStats[k]).sort((a, b) => (b.siege !== a.siege) ? (b.siege - a.siege) : (b.saetze - a.saetze));
        const einzelTbody = document.getElementById('gesamt-einzel-body');
        einzelTbody.innerHTML = '';
        sortiertEinzel.forEach((spieler, idx) => {
            let platz = idx + 1;
            if(idx === 0) platz = '<span class="podium">1🥇</span>';
            if(idx === 1) platz = '2🥈';
            if(idx === 2) platz = '3🥉';
            einzelTbody.innerHTML += `<tr><td>${platz}</td><td><strong>${spieler.name}</strong> <span style="color:#7f8c8d; font-size:0.8rem;">(Gruppe ${spieler.gruppe})</span></td><td style="text-align: right; font-weight: bold; color: var(--primary);">${spieler.siege}</td><td style="text-align: right;">${spieler.saetze}</td></tr>`;
        });
    }).catch(() => {
        alert("Fehler beim Berechnen der Gesamtergebnisse.");
    });
}

// -------------------------------------------------------------------------
// 8. BACKUP EXPORT & IMPORT
// -------------------------------------------------------------------------
function exportTournamentData() {
    if (currentUser !== 'Admin') {
        alert("Fehler: Nur der Admin darf Backups exportieren.");
        return;
    }

    database.ref('turnier').once('value').then((snapshot) => {
        const data = snapshot.val();
        if (!data) {
            alert("Es sind online noch keine Spieldaten zum Exportieren vorhanden.");
            return;
        }
        
        const exportObject = {
            turnierData: data,
            config: {
                bewerb: actBewerb,
                gruppe: actGroup,
                timestamp: new Date().toISOString()
            }
        };

        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObject, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `sc_steindorf_turnier_backup_${new Date().toISOString().slice(0,10)}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
    });
}

function triggerImport() {
    if (currentUser !== 'Admin') {
        alert("Fehler: Nur der Admin darf Backups importieren.");
        return;
    }
    document.getElementById('importFileField').click();
}

function importTournamentData(event) {
    const file = event.target.files[0];
    if (!file) return;

    if (currentUser !== 'Admin') {
        alert("Fehler: Nur der Admin darf Backups importieren.");
        event.target.value = '';
        return;
    }

    if (!confirm("ACHTUNG: Das Laden dieser Datei überschreibt alle aktuellen Online-Spielstände unwiderruflich! Fortfahren?")) {
        event.target.value = '';
        return;
    }

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const importedJson = JSON.parse(e.target.result);
            let dataToImport = importedJson;
            
            if (importedJson.turnierData) {
                dataToImport = importedJson.turnierData;
                
                if (importedJson.config) {
                    if (importedJson.config.bewerb) {
                        actBewerb = importedJson.config.bewerb;
                        safeStorage.setItem('steindorfer_bewerb', actBewerb);
                    }
                    if (importedJson.config.gruppe) {
                        actGroup = importedJson.config.gruppe;
                        safeStorage.setItem('steindorfer_group_' + actBewerb, actGroup);
                    }
                }
            }

            if (typeof dataToImport === 'object' && dataToImport !== null) {
                database.ref('turnier').set(dataToImport, (error) => {
                    if (error) {
                        alert("Fehler beim Sichern in Firebase: " + error.message);
                    } else {
                        alert("Backup erfolgreich eingespielt! Konfigurationen wurden geladen.");
                        document.getElementById('bewerbDropdown').value = actBewerb;
                        initSelects();
                        listenToFirebase(); 
                    }
                });
            } else {
                alert("Fehler: Ungültiges Datenformat im Backup.");
            }
        } catch (err) {
            alert("Fehler beim Lesen der JSON-Datei: " + err.message);
        }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function resetAllData() {
    if (currentUser !== 'Admin') {
        alert("Fehler: Nur der Admin darf die Gruppe zurücksetzen.");
        return;
    }

    if (prompt("Zur Sicherheit PIN eingeben:") === playerPins["Admin"] && confirm("Diese Gruppe online zurücksetzen? ALLE EINGETRAGENEN ERGEBNISSE DIESER GRUPPE GEHEN VERLOREN!")) {
        const standard = JSON.parse(JSON.stringify(standardSpiele[actBewerb][actGroup]));
        if (currentDbRef) currentDbRef.set(standard);
        alert("Online zurückgesetzt.");
    }
}

// -------------------------------------------------------------------------
// 9. APP INITIALISIERUNG (Config aus Firebase laden)
// -------------------------------------------------------------------------
function initApp() {
    document.getElementById('spiele-liste').innerHTML = '<p style="text-align:center; padding: 20px;">Lade Turnier-Konfiguration...</p>';
    
    const configRef = database.ref('config');
    configRef.once('value').then((snapshot) => {
        if (snapshot.exists()) {
            const configData = snapshot.val();
            gruppenStruktur = configData.gruppenStruktur || gruppenStruktur;
            spielerListen = configData.spielerListen || spielerListen;
            turnierSpielplaene = configData.turnierSpielplaene || turnierSpielplaene;
            playerPins = configData.playerPins || playerPins;
            
            startAppLogic();
        } else {
            console.log("Erster Start: Pushe lokale Config in die Firebase...");
            configRef.set({
                gruppenStruktur: gruppenStruktur,
                spielerListen: spielerListen,
                turnierSpielplaene: turnierSpielplaene,
                playerPins: playerPins
            }).then(() => {
                startAppLogic();
            });
        }
    }).catch((error) => {
        alert("Verbindungsfehler zur Datenbank: " + error.message);
        // Fallback: Mit lokalen Daten starten
        startAppLogic();
    });
}

function startAppLogic() {
    generiereStandardSpiele();
    changeState();
}

// Startschuss
initApp();
</script>
